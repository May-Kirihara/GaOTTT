name: Perf Tests

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'gaottt/**'
      - 'tests/perf/**'
      - 'scripts/perf_baseline.py'
      - 'scripts/perf_diff.py'
      - 'pyproject.toml'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # baselines/ diff needs prior commits

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies (uv)
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Lint perf tests + diag scripts (ruff)
        run: |
          .venv/bin/ruff check tests/perf/ scripts/diag_recall.py scripts/perf_baseline.py scripts/perf_diff.py

      - name: Run perf tests (Tier 1 / 3 / 4 / 5 / 6 / 7)
        run: |
          .venv/bin/python -m pytest tests/perf/ -v --tb=short

      - name: Capture perf baseline
        run: |
          .venv/bin/python scripts/perf_baseline.py \
            --corpus-size 200 \
            --recall-calls 100 \
            --label "ci-${{ github.sha }}" \
            --out-dir /tmp/perf-baselines

      - name: Upload baseline as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-${{ github.sha }}
          path: /tmp/perf-baselines/
          retention-days: 30

      # Optional gate: compare to the most recent committed baseline if one
      # exists in tests/perf/baselines/. Disabled by default — uncomment
      # once the team agrees on a regression policy.
      # - name: Diff against committed baseline
      #   run: |
      #     latest_committed=$(ls tests/perf/baselines/*.json 2>/dev/null | tail -1)
      #     if [ -n "$latest_committed" ]; then
      #       .venv/bin/python scripts/perf_diff.py \
      #         "$latest_committed" \
      #         /tmp/perf-baselines/*.json \
      #         --threshold 0.30
      #     fi
